<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Cafe Online">
    <meta name="keywords" content="chat">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat app</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-color: rgb(0, 133, 221);
        }

        .chat {
            margin: 10px;
            box-shadow: 0px 0px 5px 2px rgba(0, 60, 255, 0.205);
            width: 280px;
            height: auto;
            overflow: hidden;
            border-radius: 15px;
        }

        .chat header {
            width: 100%;
            height: 70px;
            color: aliceblue;
            background-color: rgb(0, 79, 226);
            align-items: center;
            justify-content: center;
            display: flex;
        }

        .chat article {
            background-color: aliceblue;
            height: 300px;
            width: 100%;
            padding: 10px;
            overflow-y: auto;
        }

        .message {
            display: flex;
            padding: 6px 10px;
            max-width: 70%;
            width: max-content;
            word-break: break-word;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .income {
            background-color: rgba(209, 209, 209, 0.329);
            color: black;
            border-radius: 12px 12px 12px 0;
            float: left;
            clear: both;
        }

        .outcome {
            clear: both;
            float: right;
            background-color: rgb(43, 135, 255);
            color: rgb(255, 255, 255);
            border-radius: 12px 12px 0px 12px;
        }

        .message .name {
            font-weight: bold;
        }

        .outcome .col {
            margin-left: 3px;
        }

        .income .col {
            margin-right: 3px;
        }

        footer {
            border-top: 1px solid rgba(167, 167, 167, 0.678);
            background-color: rgb(240, 240, 240);
            height: 60px;
            justify-content: center;
            align-items: center;
            display: flex;
            padding: 0 10px;
        }

        footer .text-box {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            gap: 8px;
        }

        footer input {
            flex: 1;
            height: 55%;
            padding: 0 12px; 
            width: 80%;
            border: 1px solid #ccc;
            border-radius: 15px;
        }

        footer .btn-add {
            height: 55%;
            width: 20%;
            background-color: rgb(43, 135, 255);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="chat">
        <header>
            <h1>CHAT APP</h1>
        </header>
        <article>
            <div class="message income">
                <p class="name">JK</p>
                <p class="col">:</p>
                <p>hi</p>
            </div>
            <div class="message outcome">
                <p>hello</p>
                <p class="col">:</p>
                <p class="name">Abby</p>
            </div>
            <div class="message income">
                <p class="name">JK</p>
                <p class="col">:</p>
                <p>😊💕</p>
            </div>
            <div class="message outcome">
                <p>ooooo🤞</p>
                <p class="col">:</p>
                <p class="name">Abby</p>
            </div>
        </article>
        <footer>
            <form class="text-box" onsubmit="sub(event)">
                <input type="text" id="messageInput" placeholder="Text a message..." required>
                <button type="submit" class="btn-add">Send</button>
            </form>
        </footer>
    </div>
</body>
