<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Cafe Online">
    <meta name="keywords" content="calculator">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-color: rgb(0, 133, 221);
        }
        
        .calculator{
            margin-left: 50px;
            background-color: aliceblue;
            border-radius: 10px;
            width: 250px;
            height: auto;
            padding: 20px 20px 20px 20px;
        }
        .screen {
            padding: 0 10px;
            margin-bottom: 20px;
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 8px;
            box-shadow: 0px 0px 3px 2px rgba(182, 182, 182, 0.308) inset;
            background-color: rgba(233, 233, 233, 0.397);
            overflow-x:auto ;
            font-weight: bold;
            font-size: 22px;
            text-align: right;
        }
        .equal-key {
            grid-column: span 2;
        }
        .key {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            
        }
        .key button {
            height: 40px;
            border: none;
            box-shadow: 0px 0px 5px 2px rgba(182, 182, 182, 0.363);
            border-radius: 5px;
            background-color: rgb(179, 222, 252);
            cursor: pointer;

            font-weight: bold;
            font-size: 20px;
        }
        .key .clear-key{
            background-color: orangered;
            color: aliceblue;
        }
        .key .equal-key {
            background-color: rgb(38, 235, 153);
            color: aliceblue;
        }
        .key .op-key {
            background-color: rgb(255, 193, 21);
        }
    </style>
</head>

<body>
    <div class="calculator">
        <input type="text" class="screen" value="8.3 + 1.7" readonly>
        <div class="key">
            <button type="button" class="op-key">+</button>
            <button type="button" class="op-key">-</button>
            <button type="button" class="op-key">×</button>
            <button type="button" class="op-key">÷</button>

            <button type="button">7</button>
            <button type="button">8</button>
            <button type="button">9</button>
            <button type="button">4</button>

            <button type="button">5</button>
            <button type="button">6</button>
            <button type="button">1</button>
            <button type="button">2</button>

            <button type="button">3</button>
            <button type="button">0</button>
            <button type="button">.</button>
            <button type="button" class="clear-key">C</button>
        
            <button type="button" class="equal-key">=</button>
        </div>

    </div>
</body>
