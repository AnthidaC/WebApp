<!DOCTYPE html>

<head>
    <style>
        * {
            justify-content: center;
        }
        header{
            height: 50px;
            background-color: antiquewhite;
        }
        nav{
            background-color: aqua;
            width: 25%;
            height: 125px;
            float: left;
        }
        main{
            background-color: plum;
            width: 50%;
            height: 125px;
            float: left;
        }
        aside{
            background-color: brown;
            width: 25%;
            height: 125px;
            float: left;
        }
        footer{
            clear: both;
            height: 50px;
            background-color: greenyellow;
        }
    </style>
</head>

<body>

    <header>header</header>
    <nav>nav</nav>
    <main>main</main>
    <aside>aside</aside>
    <footer>footer</footer>
</body>
