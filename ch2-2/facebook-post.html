<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Cafe Online">
    <meta name="keywords" content="facebook">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>facebook post</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-color: rgb(224, 224, 224);
        }

        .post {
            background-color: azure;
            width: 340px;
            height: auto;
            margin: 20px;
            border-radius: 5px;
        }

        header {
            margin: 5px;
            font-size: 10px;
            height: auto;
            gap: 2px;
        }

        .content {
            height: auto;
            justify-content: start;
            display: flex;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
        }

        .profile-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .post-actions {
            display: flex;
            gap: 10px;
        }

        .menu-btn,
        .close-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: #65676b;
            padding: 5px;
        }

        .menu-btn:hover,
        .close-btn:hover {
            background-color: #f0f2f5;
            border-radius: 50%;
        }

        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            /* ทำให้รูปเป็นวงกลม */
            object-fit: cover;
        }

        .name-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .name {
            font-weight: bold;
            font-size: 15px;
            margin: 0;
        }

        .verify-icon {
            width: 16px;
            height: 16px;
        }

        .status {
            font-size: 13px;
            color: #65676b;
            /* สีเทาตามสไตล์ Facebook */
            margin: 0;
        }

        .content {
            display: flex;
            margin: 10px;
        }

        .post-img {
            display: flex;
            justify-content: center;
        }

        .post-img img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #e2e3e4;
            font-size: 12px;
            height: 50px;
        }

        .link-content {
            display: flex;
            flex-direction: column;
            word-break: break-word;
            color: #65676b;
            flex: 1;
            overflow: hidden;
        }

        .link-content .link-title {
            color: #000000;
        }

        .link-content .link-description {
            color: #65676b;
            line-clamp: 1;
            -webkit-line-clamp: 1;
            overflow: hidden;
            -webkit-box-orient: vertical;
            display: -webkit-box;
        }

        .link-button {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
            background-color: #97979738;
            border: none;
            width: 70px;
            height: 30px;
            font-weight: bold;
        }

        .divider {
            border-top: 1px solid #ced0d4;
        }
        .post-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #65676b;
            padding: 0 10px;
        }
        .post-actions {
            display: flex;
            justify-content: space-around;
            padding: 5px 0;
        }
        .post-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: #65676b;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="post">
        <header>
            <div class="post-header">
                <div class="profile-container">
                    <img src="./image/channels4_profile.jpg" alt="Profile" class="profile-pic">
                    <div class="user-info">
                        <div class="name-wrapper">
                            <span class="name">MongoDB</span>
                            <img src="./image/verified.jfif" alt="Verified" class="verify-icon">
                        </div>
                        <p class="status">ได้รับการสนับสนุน · <span class="globe-icon">🌍</span></p>
                    </div>
                </div>
                <div class="post-actions">
                    <button class="menu-btn">···</button>
                    <button class="close-btn">✕</button>
                </div>
            </div>
        </header>
        <main>
            <div class="content">
                <p>take advantage of youe SQL skillset</p>
            </div>
            <div class="post-img">
                <img src="./image/content.png" alt="Post Image">
            </div>
            <div class="link">
                <div class="link-content">
                    <p class="link-url">LEARN.MONGODB.COM</p>
                    <p class="link-title">Register today for free</p>
                    <p class="link-description">MongoDB University offers free online courses to help you learn MongoDB
                        and NoSQL databases.</p>
                </div>
                <div class="link-button">
                    <button class="link-button">ลงทะเบียน</button>
                </div>
            </div>
        </main>

        <footer>
            <div class="post-stats">
                <span>👍 2.4 พัน</span>
                <span>103 ความคิดเห็น · แชร์ 45 ครั้ง</span>
            </div>

            <div class="divider"></div>
            <div class="post-actions">
                <button><span>👍</span> ถูกใจ</button>
                <button><span>💬</span> แสดงความคิดเห็น</button>
                <button><span>↗️</span> แชร์</button>
            </div>
        </footer>

    </div>
</body>
